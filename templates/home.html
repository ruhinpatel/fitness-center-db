{% extends 'base.html' %}
{% block content %}
<div class="jumbotron jumbotron-fluid bg-light text-center">
    <div class="container">
        <h1 class="display-4">Fitness Center Management System</h1>
        <p class="lead">Manage your fitness center efficiently and effectively.</p>
    </div>
</div>

<div id="fitnessCarousel" class="carousel slide" data-ride="carousel">
    <ol class="carousel-indicators">
        <li data-target="#fitnessCarousel" data-slide-to="0" class="active"></li>
        <li data-target="#fitnessCarousel" data-slide-to="1"></li>
        <li data-target="#fitnessCarousel" data-slide-to="2"></li>
    </ol>
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="{{ url_for('static', filename='fitness-center-1.jpg') }}" class="d-block w-100 carousel-image" alt="Fitness Image 1">
        </div>
        <div class="carousel-item">
            <img src="{{ url_for('static', filename='fitness-center-2.jpg') }}" class="d-block w-100 carousel-image" alt="Fitness Image 2">
        </div>
        <div class="carousel-item">
            <img src="{{ url_for('static', filename='fitness-center-4.jpg') }}" class="d-block w-100 carousel-image" alt="Fitness Image 3">
        </div>
    </div>
    <a class="carousel-control-prev" href="#fitnessCarousel" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
    </a>
    <a class="carousel-control-next" href="#fitnessCarousel" role="button" data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
    </a>
</div>
{% endblock %}
