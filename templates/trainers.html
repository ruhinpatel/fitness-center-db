{% extends 'base.html' %}

{% block content %}
<h1>Trainers</h1>

<!-- Form to Add a New Trainer -->
<form method="POST" action="{{ url_for('trainers') }}">
    <div class="form-group">
        <label for="person_id">Person ID</label>
        <input type="number" class="form-control" id="person_id" name="person_id" required>
    </div>
    <div class="form-group">
        <label for="diploma">Diploma</label>
        <input type="text" class="form-control" id="diploma" name="diploma" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Trainer</button>
</form>

<!-- Display Existing Trainers -->
<h2>Existing Trainers</h2>
<table class="table table-striped">
    <thead>
        <tr>
            {% for column in columns %}
            <th>{{ column }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for trainer in trainers %}
        <tr>
            <td>{{ trainer.trainer_id }}</td>
            <td>{{ trainer.person_id }}</td>
            <td>{{ trainer.diploma }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
