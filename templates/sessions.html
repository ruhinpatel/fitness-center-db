{% extends 'base.html' %}
{% block content %}
<h1>Sessions</h1>

<!-- Form to Add Session -->
<form method="POST" action="{{ url_for('sessions') }}">
    <div class="form-group">
        <label for="session_date">Session Date</label>
        <input type="date" class="form-control" id="session_date" name="session_date" required>
    </div>
    <div class="form-group">
        <label for="start_hour">Start Hour</label>
        <input type="time" class="form-control" id="start_hour" name="start_hour" required>
    </div>
    <div class="form-group">
        <label for="type">Type</label>
        <input type="text" class="form-control" id="type" name="type" required>
    </div>
    <div class="form-group">
        <label for="room_id">Room ID</label>
        <input type="number" class="form-control" id="room_id" name="room_id" required>
    </div>
    <div class="form-group">
        <label for="center_id">Center ID</label>
        <input type="number" class="form-control" id="center_id" name="center_id" required>
    </div>
    <button type="submit" class="btn btn-primary">Add Session</button>
</form>

<!-- Display Sessions -->
<div id="sessions-container">
    <h2>Existing Sessions</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                {% for column in columns %}
                <th>{{ column }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for session in sessions %}
            <tr>
                {% for column in columns %}
                <td>{{ session[column] }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
